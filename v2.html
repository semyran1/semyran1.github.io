<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Серафим Панюшкин — сценарист · режиссёр · продюсер</title>
<meta name="description" content="Режиссёр и сценарист видеоконтента: YouTube-каналы с нуля, вирусные AI-ролики, документалки и перфомансы. Кейсы с цифрами внутри.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141311;
  --gray:#847f74;
  --soft:#3c382f;
  --bg:#fbfaf6;
  --card-bg:#fbfaf6;
  --acc:#ffe600;
  /* один акцент на весь сайт — панк-визитка, не корпорация */
  --c-cerca:var(--acc);--c-zero:var(--acc);--c-lines:var(--acc);--c-ai:var(--acc);
  --c-docs:var(--acc);--c-reel:var(--acc);--c-perf:var(--acc);--c-an:var(--acc);--c-sun:var(--acc);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Manrope',-apple-system,sans-serif;
  font-size:17px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  transition:background .7s ease,color .7s ease;
}
/* смена фона по секциям (кино-переходы: тёмные/светлые сцены чередуются) */
body.bg-paper{--bg:#f5f2ec;--card-bg:#f5f2ec}
body.bg-warm{--bg:#efe6d2;--card-bg:#efe6d2}
body.bg-dark{
  --ink:#f5f4f0;--gray:#8f897c;--soft:#cfcabd;
  --bg:#0b0b0c;--card-bg:#141412;
}
body.bg-dark .card .cov,body.bg-dark .ch,body.bg-dark .reel{border-color:#333}
body.bg-dark .facts li::before{color:var(--acc)}

/* играющие буквы — переиспользуется в hero, заголовках секций, титрах */
.pf{display:inline-block;transition:transform .18s,color .18s}
.pf:hover{animation:jig .35s ease-in-out infinite;color:var(--acc)}
@keyframes jig{0%,100%{transform:rotate(-4deg) translateY(-2px)}50%{transform:rotate(4deg) translateY(2px)}}
@media (prefers-reduced-motion: reduce){.pf:hover{animation:none}}

/* жёлтый маркер-хайлайт вместо подчёркивания */
.marker{position:relative;white-space:nowrap;padding:0 .08em}
.marker::before{content:"";position:absolute;inset:6% -4% 10%;background:var(--acc);z-index:-1;transform:rotate(-1deg)}
body.bg-dark .marker{color:#141311}
.wrap{max-width:1240px;margin:0 auto;padding:0 28px}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;color:var(--gray)}
a{color:inherit}
::selection{background:var(--ink);color:#fff}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(10px);transition:background .7s ease}
.nav{display:flex;align-items:center;justify-content:space-between;height:58px;gap:14px}
.logo{font-weight:800;font-size:16px;text-decoration:none;letter-spacing:.02em}
.logo i{font-style:normal;color:var(--c-cerca)}
.nav-links{display:flex;gap:20px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em}
.nav-links a{text-decoration:none;color:var(--gray)}
.nav-links a:hover{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:10px}
.lang{display:flex;gap:2px}
.lang button{background:none;border:0;color:var(--gray);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:5px 8px;cursor:pointer}
.lang button.on{color:var(--ink);text-decoration:underline 2px}
.burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;background:none;border:0;cursor:pointer;padding:0}
.burger span{display:block;width:100%;height:2px;background:var(--ink);transition:transform .25s,opacity .25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:820px){
  .burger{display:flex}
  header{position:sticky}
  .nav-links{
    position:absolute;left:0;right:0;top:100%;flex-direction:column;gap:0;
    background:var(--bg);border-top:1px solid var(--ink);
    max-height:0;overflow:hidden;transition:max-height .35s ease;
  }
  .nav-links.open{max-height:320px}
  .nav-links a{padding:16px 28px;border-bottom:1px solid rgba(120,115,100,.2);color:var(--ink)}
}

/* ---------- hero: кино-фон 21:9, играющие буквы ---------- */
.kino{position:relative;min-height:92vh;padding-top:0;background:#000;color:#f2f2f2;overflow:hidden}
.kino .band{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);aspect-ratio:21/9;overflow:hidden}
.kino .band video{width:100%;height:100%;object-fit:cover}
.kino .veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.78) 0%,rgba(0,0,0,.5) 52%,rgba(0,0,0,.28) 100%)}
.kino::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.42);transition:background .5s;pointer-events:none}
body.peek .kino::after{background:rgba(0,0,0,.08)}
.kino .in{position:relative;z-index:2;min-height:92vh;display:flex;flex-direction:column;justify-content:center;max-width:1240px;margin:0 auto;padding:70px 28px 60px}
.kino .name{font-weight:800;font-size:clamp(54px,11.6vw,168px);line-height:.88;letter-spacing:-.05em;user-select:none;text-shadow:0 4px 40px rgba(0,0,0,.45);color:#f2f2f2}
.kino .name .pf:hover{color:#ffe600}
.kino .iam{margin-top:34px;font-weight:700;font-size:clamp(20px,2.4vw,32px);letter-spacing:-.02em}
.kino .iam .w{position:relative;padding:2px 10px;color:#111;white-space:nowrap}
.kino .iam .w::before{content:"";position:absolute;inset:-2px -6px;background:#ffe600;border-radius:3px;transform:rotate(-1.2deg);z-index:-1;box-shadow:0 0 34px rgba(255,230,0,.45)}
.kino .tags{margin-top:46px;display:flex;gap:13px 26px;flex-wrap:wrap;max-width:860px}
.kino .tag{display:inline-grid;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.06em;color:#bdbdbd;cursor:pointer;border-bottom:1px dotted #555;padding-bottom:3px;text-decoration:none}
.kino .tag span{grid-area:1/1;white-space:nowrap;transition:opacity .25s}
.kino .tag .alt2{opacity:0;color:#ffe600}
.kino .tag:nth-child(2n){transform:rotate(1.6deg)}
.kino .tag:nth-child(3n){transform:rotate(-1.8deg)}
.kino .tag:hover{border-color:#ffe600;animation:jig .4s ease-in-out infinite}
.kino .tag:hover .base2{opacity:0}
.kino .tag:hover .alt2{opacity:1}
/* активный тег авто-экскурсии — визуал ховера без бесконечного jig */
.kino .tag.tour-active{border-color:#ffe600}
.kino .tag.tour-active .base2{opacity:0}
.kino .tag.tour-active .alt2{opacity:1}
.kino .go{display:inline-block;align-self:flex-start;margin-top:40px;background:#ffe600;color:#111;font-weight:800;font-size:15px;padding:13px 24px;text-decoration:none;transform:rotate(-1.2deg);box-shadow:0 0 30px rgba(255,230,0,.25);transition:transform .2s}
.kino .go:hover{transform:rotate(0) scale(1.04)}
.kino .go.stamp{animation:stamp .32s ease}
@keyframes stamp{0%{transform:scale(1) rotate(-1.2deg)}40%{transform:scale(.9) rotate(0)}100%{transform:scale(1) rotate(-1.2deg)}}
@media(max-width:700px){
  .kino{min-height:0}
  .kino .band{aspect-ratio:16/9;top:0;bottom:auto;transform:none}
  .kino .in{padding:calc(100vw * 9 / 16 + 28px) 20px 40px;min-height:100dvh;justify-content:flex-start}
  .kino .name{font-size:clamp(40px,15vw,64px)}
  .kino .tags{margin-top:32px;gap:10px 18px;max-width:none}
  .kino .go{width:100%;text-align:center;margin-top:32px}
}
@media (prefers-reduced-motion: reduce){
  .kino .tag:hover{animation:none}
}

/* ---------- статичные стат-плашки (цифры результата) ---------- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin:44px 0;background:color-mix(in srgb,var(--ink) 16%,transparent);border:1px solid color-mix(in srgb,var(--ink) 16%,transparent)}
.stat{background:var(--bg);padding:22px 20px;display:flex;flex-direction:column;gap:6px;transition:background .7s ease}
.stat b{position:relative;display:inline-block;align-self:flex-start;font-weight:800;font-size:clamp(26px,3.4vw,40px);line-height:1;letter-spacing:-.01em;color:var(--ink)}
.stat b::before{content:"";position:absolute;inset:12% -6% 6%;background:var(--acc);z-index:-1;opacity:.9;transform:rotate(-1.4deg)}
.stat .l{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gray)}
.stat:nth-child(2n) b{transform:rotate(-.6deg)}
.stat:nth-child(3n) b{transform:rotate(.5deg)}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}

/* ---------- letterbox-склейка между сценами ---------- */
.letterbox{position:fixed;left:0;right:0;z-index:200;background:#000;pointer-events:none;height:0;transition:height .55s cubic-bezier(.6,0,.2,1)}
.letterbox.top{top:0}.letterbox.bottom{bottom:0}
body.splice .letterbox{height:9vh}
@media (prefers-reduced-motion: reduce){.letterbox{display:none}}

/* ---------- прелоадер-ракорд ---------- */
.preload{position:fixed;inset:0;z-index:500;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,visibility .5s}
.preload .num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(48px,15vw,120px);color:#ffe600;line-height:1}
.preload.out{opacity:0;visibility:hidden}
.cta-btn{
  display:inline-block;text-decoration:none;background:var(--acc);color:#141311;
  font-weight:800;font-size:16px;padding:13px 26px;margin-top:8px;transition:transform .2s;
  transform:rotate(-1deg);box-shadow:0 0 0 rgba(255,230,0,0);
}
.cta-btn:hover{transform:rotate(0) scale(1.04)}
.cta-btn.stamp{animation:stamp .32s ease}

/* ---------- sections ---------- */
section{padding:96px 0 0}
.scene{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.14em;
  color:var(--gray);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:12px;
}
.scene::after{content:"";flex:0 0 46px;height:1px;background:var(--gray);opacity:.5}
.sec-title{font-weight:800;font-size:clamp(30px,4.6vw,54px);line-height:1.05;letter-spacing:-.01em;overflow:hidden}
.sec-title .dot{color:var(--acc)}
.sec-sub{color:var(--gray);margin-top:12px;max-width:640px;font-size:15.5px}

/* ---------- case ---------- */
.case{margin-top:64px;position:relative;--c:var(--ink)}
.case-head{max-width:760px}
.case-num{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:#141311;background:var(--acc);padding:3px 8px;letter-spacing:.06em;transform:rotate(-1deg)}
.case h3{font-weight:800;font-size:clamp(23px,3vw,34px);line-height:1.12;margin-top:10px;overflow:hidden}
.case h3 u{text-decoration:none;background:linear-gradient(transparent 62%,var(--acc) 62%);background-repeat:no-repeat;padding:0 .05em;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.case .role{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gray);margin-top:10px;letter-spacing:.04em}
.case .desc{color:var(--soft);margin-top:12px;font-size:15.5px}
.metrics{display:flex;flex-wrap:wrap;gap:8px 38px;margin:22px 0 8px;align-items:baseline}
.metric .v{position:relative;display:inline-block;font-weight:800;font-size:clamp(26px,3.4vw,40px);color:var(--ink);line-height:1.05;letter-spacing:-.01em;transition:transform .18s}
.metric .v::before{content:"";position:absolute;inset:8% -6% 4%;background:var(--acc);z-index:-1;opacity:.9;transform:rotate(-1.4deg)}
.metric .l{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray);margin-top:2px;letter-spacing:.03em}
.metric:nth-child(2){transform:rotate(-.8deg)}
.metric:nth-child(3){transform:rotate(.6deg)}
.case:hover .metric .v{animation:jig .4s ease-in-out infinite}
@media (prefers-reduced-motion: reduce){.case:hover .metric .v{animation:none}}

/* cards */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 18px;margin-top:26px}
.grid.g4{grid-template-columns:repeat(4,1fr)}
.grid.g2{grid-template-columns:repeat(2,minmax(0,460px))}
@media(max-width:1000px){.grid.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.grid,.grid.g4,.grid.g2{grid-template-columns:1fr}}
.card{display:block;text-decoration:none;transition:transform .2s}
.card .cov{border:1px solid var(--ink);padding:5px;transition:border-color .2s;position:relative}
.card .cov .im{aspect-ratio:16/9;overflow:hidden;position:relative;background:#e9e6dd}
.card .cov img,.card .cov video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card .cov .im img.sw,.card .cov .im video.sw{opacity:0;transition:opacity .5s ease}
.card .cov .im img.sw.on,.card .cov .im video.sw.on{opacity:1}
.card:hover{transform:translateY(-4px)}
.card:hover .cov{border-color:var(--acc);border-width:2px}
.card .t{font-weight:700;font-size:14.5px;line-height:1.4;margin-top:10px}
.card:hover .t{text-decoration:underline;text-decoration-color:var(--acc);text-decoration-thickness:3px;text-underline-offset:4px}
.card .m{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gray);margin-top:4px;letter-spacing:.03em}
.card .tag{
  position:absolute;top:-9px;right:10px;background:var(--acc);color:#141311;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  padding:2px 8px;letter-spacing:.05em;transform:rotate(1.5deg);
}

/* каналы */
.channels{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px}
@media(max-width:820px){.channels{grid-template-columns:1fr}}
.ch{display:flex;gap:14px;align-items:center;text-decoration:none;border:1px solid var(--ink);padding:14px;transition:transform .2s,border-color .2s}
.ch:hover{border-color:var(--acc);border-width:2px;transform:rotate(-.6deg)}
.ch img{width:56px;height:56px;border-radius:50%}
.ch .t{font-weight:800;font-size:15.5px}
.ch .m{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gray);margin-top:3px}
.ch .num{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:5px}
.ch .num b{position:relative;display:inline-block;color:var(--ink);font-size:17px;font-weight:800;line-height:1.05}
.ch .num b::before{content:"";position:absolute;inset:4% -8% 0;background:var(--acc);z-index:-1;opacity:.9;transform:rotate(-1.2deg)}
.ch .num .n2 b{color:var(--ink);font-size:14px}
.ch .num .n2 b::before{opacity:.7}
.ch .num span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gray);letter-spacing:.02em}
.footnote{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gray);margin-top:16px;letter-spacing:.03em}
.footnote b{color:var(--ink)}

/* showreel */
.reel{display:grid;grid-template-columns:1.3fr 1fr;gap:0;border:1px solid var(--ink);padding:8px;margin-top:40px;text-decoration:none;transition:border-color .2s,transform .2s}
.reel:hover{border-color:var(--acc);border-width:2px;transform:rotate(-.4deg)}
.reel .im{aspect-ratio:16/9;position:relative;overflow:hidden;background:#e9e6dd}
.reel .im img,.reel .im video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.reel .im video{opacity:0;transition:opacity .5s ease}
.reel .im video.on{opacity:1}
.reel-body{padding:26px 30px;display:flex;flex-direction:column;justify-content:center;gap:10px}
.reel-body .t{font-weight:800;font-size:clamp(20px,2.4vw,28px);line-height:1.15}
.reel:hover .t{text-decoration:underline;text-decoration-color:var(--acc);text-decoration-thickness:3px;text-underline-offset:5px}
.reel-body p{color:var(--gray);font-size:14.5px}
.reel-body .go{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);font-weight:700}
@media(max-width:820px){.reel{grid-template-columns:1fr}.reel-body{padding:18px 6px 8px}}

/* аналитика */
.shots{display:flex;gap:14px;overflow-x:auto;padding:24px 4px 14px;scroll-snap-type:x mandatory}
.shots::-webkit-scrollbar{height:6px}
.shots::-webkit-scrollbar-thumb{background:#ddd}
.shot{flex:0 0 auto;max-width:84vw;scroll-snap-align:start;border:1px solid var(--ink);padding:5px}
.shot img{height:min(300px,52vw);width:auto;max-width:100%;object-fit:contain;display:block}

/* wip — постер «Слепого пятна» */
.wip{margin-top:26px;display:grid;grid-template-columns:minmax(0,560px) 1fr;gap:28px;align-items:center}
@media(max-width:820px){.wip{grid-template-columns:1fr}}
.wip-poster{position:relative;border:1px solid var(--ink);padding:7px}
.wip-poster img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.wip-overlay{position:absolute;left:28px;bottom:26px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.wip-name{font-weight:800;font-size:clamp(22px,3vw,34px);line-height:1.05;letter-spacing:.02em;text-transform:lowercase}
.wip-sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;margin-top:6px;opacity:.85}
.wip .t{font-weight:800;font-size:clamp(17px,2vw,22px)}
.wip .d{color:var(--gray);font-size:14px;margin:8px 0 12px;max-width:420px}
.wip .soon{font-family:'JetBrains Mono',monospace;font-size:11px;color:#141311;background:var(--acc);padding:3px 8px;font-weight:700;letter-spacing:.06em}

/* about */
.polas{display:flex;gap:26px;margin-top:40px;align-items:flex-start}
@media(max-width:820px){.polas{flex-wrap:wrap;justify-content:center}}
.pola{background:#fff;border:1px solid #e2e2e0;padding:8px 8px 34px;box-shadow:0 10px 28px -14px rgba(0,0,0,.28);flex:1 1 0;max-width:300px;min-width:200px;transition:transform .3s cubic-bezier(.2,.7,.3,1),box-shadow .3s}
.pola:nth-child(1){transform:rotate(-3deg)}
.pola:nth-child(2){transform:rotate(1.6deg) translateY(16px)}
.pola:nth-child(3){transform:rotate(-1.2deg)}
.pola:hover{transform:rotate(0) scale(1.04);box-shadow:0 20px 40px -16px rgba(0,0,0,.4);z-index:5;position:relative}
.pola img{width:100%;display:block;aspect-ratio:4/5;object-fit:cover}
.pola .cap{font-family:'JetBrains Mono',monospace;font-size:10px;color:#777;margin-top:8px;text-align:center}
.about-cols{display:grid;grid-template-columns:1.2fr .8fr;gap:48px;margin-top:44px;align-items:start}
@media(max-width:920px){.about-cols{grid-template-columns:1fr}}
.about-cols p{margin-bottom:14px;color:var(--soft);font-size:16px}
.about-cols p b{font-weight:800}
.facts{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:2.1;color:var(--soft);letter-spacing:.02em}
.facts li{list-style:none;padding-left:22px;position:relative}
.facts li::before{content:"→";position:absolute;left:0;color:var(--ink);font-weight:700}

/* footer — титры фильма */
footer{margin-top:120px;padding:90px 0 32px}
.credits{
  font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;
  color:var(--gray);text-transform:uppercase;text-align:center;
  display:flex;flex-direction:column;gap:10px;margin-bottom:60px;
}
.credits .row b{color:var(--ink);font-weight:700}
.foot-phrase{font-weight:800;font-size:clamp(30px,5.4vw,64px);line-height:1.08;letter-spacing:-.01em;max-width:900px;margin:0 auto;text-align:center}
.foot-phrase i{font-style:normal;color:var(--acc)}
.foot-cta{justify-content:center}
.foot-cta{display:flex;gap:16px;flex-wrap:wrap;margin-top:34px}
.foot-cta .cta-btn{margin:0}
.foot-cta .alt-btn{
  display:inline-block;text-decoration:none;border:1px solid var(--ink);
  font-weight:700;font-size:15px;padding:13px 26px;transition:.2s;
}
.foot-cta .alt-btn:hover{transform:rotate(1.2deg);border-color:var(--acc);color:var(--acc)}
.foot-bottom{
  display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:70px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#aaa;letter-spacing:.04em;
}
.foot-bottom span b{color:#777}

/* reveal-анимация */
.rv{opacity:0;transform:translateY(26px) rotate(.6deg)}
.rv.in{opacity:1;transform:none;transition:opacity .7s cubic-bezier(.2,.7,.3,1),transform .7s cubic-bezier(.2,.7,.3,1)}
/* маска: заголовок выезжает снизу из-под обрезанной рамки */
.rv-mask{overflow:hidden}
.rv-mask > *{display:block;transform:translateY(110%);transition:transform .8s cubic-bezier(.2,.8,.2,1)}
.rv-mask.in > *{transform:translateY(0)}
@media (prefers-reduced-motion: reduce){.rv-mask > *{transform:none}}
/* карточки стаггером */
.rv-stagger.in .card,.rv-stagger.in .ch{animation:rvup .6s cubic-bezier(.2,.7,.3,1) backwards}
.rv-stagger.in .card:nth-child(1),.rv-stagger.in .ch:nth-child(1){animation-delay:.03s}
.rv-stagger.in .card:nth-child(2),.rv-stagger.in .ch:nth-child(2){animation-delay:.09s}

.rv-stagger.in .card:nth-child(7){animation-delay:.39s}
.rv-stagger.in .card:nth-child(8){animation-delay:.45s}
@keyframes rvup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.rv-stagger.in .card,.rv-stagger.in .ch{animation:none}}

    ?`<div class="im" style="position:relative;background:${igGrad[(it.ig-1)%3]}"><svg style="position:absolute;inset:0;margin:auto" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.6"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.4"/><circle cx="17.6" cy="6.4" r="1.3" fill="#111" stroke="none"/></svg></div>`
    :`<div class="im"><img src="${it.cover}" alt="${pick(it.t,lang)}" loading="lazy"></div>`;
  const slidesAttr=it.slides?` data-slides="${it.slides.join("|")}"`:"";
  const clipAttr=it.clip?` data-clip="${it.clip}"`:"";
  return `<a class="card" href="${it.href}" target="_blank" rel="noopener"${slidesAttr}${clipAttr}>
    <div class="cov">${tag}${inner}</div>
    <div class="t">${pick(it.t,lang)}</div>${it.m?`<div class="m">${pick(it.m,lang)}</div>`:""}
  </a>`;
}

function chCardHTML(ch,lang){
  return `<a class="ch" href="${ch.href}" target="_blank" rel="noopener">
    <img src="${ch.img}" alt="${ch.t}">
    <div><div class="t">${ch.t}</div><div class="m">${pick(ch.m,lang)}</div></div>
    <div class="num">
      <div><b>${ch.v}</b><span>${pick(ch.l,lang)}</span></div>
      <div class="n2"><b>${ch.v2}</b><span>${pick(ch.l2,lang)}</span></div>
    </div>
  </a>`;
}

/* играющие буквы: разбивает текстовые узлы элемента на .pf-споны, сохраняя вложенные теги (<u>, .dot) */
function playfulize(el){
  const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  const ROT=[0,2.2,-2.4,0,1.4,-1.8,1.6];
  let i=0;
  nodes.forEach(node=>{
    const frag=document.createDocumentFragment();
    [...node.textContent].forEach(ch=>{
      if(ch===" "){frag.appendChild(document.createTextNode(" "));return;}
      const s=document.createElement("span");
      s.className="pf";
      const r=ROT[i%ROT.length];
      if(r)s.style.transform=`rotate(${r}deg)`;
      i++;
      s.textContent=ch;
      frag.appendChild(s);
    });
    node.replaceWith(frag);
  });
}
/* маска-reveal: заворачивает содержимое в одну обёртку, которая едет по CSS .rv-mask > * */
function maskWrap(el){
  const inner=document.createElement("span");
  inner.className="mask-inner";
  while(el.firstChild)inner.appendChild(el.firstChild);
  el.appendChild(inner);
}

function render(lang){
  const t=I18N[lang];
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{if(t[el.dataset.i18n]!==undefined)el.textContent=t[el.dataset.i18n]});
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{if(t[el.dataset.i18nHtml]!==undefined)el.innerHTML=t[el.dataset.i18nHtml]});
  document.querySelectorAll(".rv-mask").forEach(el=>{playfulize(el);maskWrap(el);});

  const statsHTML=t.strip.map(s=>{
    const m=s.match(/^(<b>.*?<\/b>)\s*([\s\S]*)$/);
    return m?`<div class="stat">${m[1]}<span class="l">${m[2]}</span></div>`
            :`<div class="stat"><span class="l">${s}</span></div>`;
  }).join("");
  document.getElementById("strip").innerHTML=statsHTML;
  document.getElementById("strip2").innerHTML=statsHTML;

  renderHero(lang);

  document.getElementById("cerca-grid").innerHTML=CERCA.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("lines-grid").innerHTML=LINES.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("ai-grid").innerHTML=AI.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("comm-grid").innerHTML=COMM.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("docs-grid").innerHTML=DOCS.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("pod-grid").innerHTML=PODS.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("sun-grid").innerHTML=SUN_VIDS.map(it=>cardHTML(it,lang)).join("");
  document.getElementById("sun-channel").innerHTML=[SUN_CH].map(ch=>chCardHTML(ch,lang)).join("");
  document.getElementById("pod-channel").innerHTML=[POD_CH].map(ch=>chCardHTML(ch,lang)).join("");
  document.getElementById("zero-channels").innerHTML=ZERO_CH.map(ch=>chCardHTML(ch,lang)).join("");

  document.getElementById("lang-ru").classList.toggle("on",lang==="ru");
  document.getElementById("lang-en").classList.toggle("on",lang==="en");
  document.title=lang==="ru"
    ?"Серафим Панюшкин — сценарист · режиссёр · продюсер"
    :"Serafim Panyushkin — scriptwriter · director · producer";
  initReveal();
  initCount();
}

/* ===================== движок слайд-шоу (crossfade) =====================
   Универсальный кроссфейд-движок на двух <img> слоях. Используется и для
   idle-фото в hero, и для ховер-превью облака, и для карточек кейсов. */
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

function crossfade(imgA, imgB, srcs, interval){
  let idx=0, active=0;
  const els=[imgA,imgB];
  els[0].src=srcs[0]; els[0].classList.add("on"); els[1].classList.remove("on");
  if(reduceMotion || srcs.length<2) return null;
  return setInterval(()=>{
    idx=(idx+1)%srcs.length;
    const next=1-active;
    els[next].src=srcs[idx]; els[next].classList.add("on");
    els[active].classList.remove("on");
    active=next;
  },interval);
}

/* ===== hero: рендер, ротация роли, клип-фон, авто-экскурсия ===== */
const kinoV=document.getElementById("kino-video");
const KINO_DEFAULT="assets/clip_reel.mp4";
let kinoCur=KINO_DEFAULT, heroLang="ru", roleIdx=0;
const heroReduce=matchMedia("(prefers-reduced-motion: reduce)").matches;

function kinoShow(src){
  kinoCur=src;
  if(kinoV.getAttribute("src")!==src){kinoV.src=src}
  const pl=()=>{if(kinoCur===src)kinoV.play().catch(()=>{})};
  if(kinoV.readyState>=2)pl();else kinoV.addEventListener("canplay",pl,{once:true});
}
/* браузер глушит muted-видео в фоновой вкладке — будим */
["visibilitychange","focus","pointermove","pointerdown"].forEach(ev=>
  addEventListener(ev,()=>{if(kinoV.paused)kinoV.play().catch(()=>{})},{passive:true}));

/* ---- авто-экскурсия: шоурил → клип каждого тега (+подсветка+метрика) → цикл ---- */
let tourSteps=[], tourIdx=0, tourPaused=false, tourStarted=false, tourTimer=null;

function setActiveTag(tagEl){
  document.querySelectorAll("#kino-tags .tag").forEach(t=>t.classList.toggle("tour-active",t===tagEl));
  document.body.classList.toggle("peek",!!tagEl);
}
function armWatchdog(){
  clearTimeout(tourTimer);
  const set=()=>{
    clearTimeout(tourTimer);
    const ms=(isFinite(kinoV.duration)&&kinoV.duration>0)?kinoV.duration*1000+2500:32000;
    tourTimer=setTimeout(()=>{if(!tourPaused)tourNext();},ms);
  };
  if(kinoV.readyState>=1)set();else kinoV.addEventListener("loadedmetadata",set,{once:true});
}
function tourApply(){
  const step=tourSteps[tourIdx];if(!step)return;
  setActiveTag(step.tag);
  kinoShow(step.clip);
  armWatchdog();
}
function tourNext(){
  if(!tourSteps.length)return;
  tourIdx=(tourIdx+1)%tourSteps.length;
  tourApply();
}
kinoV.addEventListener("ended",()=>{if(!tourPaused)tourNext();});

function renderHero(lang){
  heroLang=lang;
  const nameEl=document.getElementById("kino-name");
  nameEl.innerHTML=pick(HERO.name,lang).split("\n").map(line=>
    [...line].map(ch=>ch===" "?" ":`<span class="pf">${ch}</span>`).join("")
  ).join("<br>");
  document.getElementById("kino-pre").textContent=pick(HERO.pre,lang);
  document.getElementById("kino-word").textContent=HERO.roles[lang][roleIdx%HERO.roles[lang].length];
  const tags=document.getElementById("kino-tags");
  tags.innerHTML=HERO.tags.map((tg,i)=>{
    const [base,alt]=tg[lang];
    return `<a class="tag" href="${tg.href}" data-clip="${tg.clip}"><span class="base2">${base}</span><span class="alt2">${alt}</span></a>`;
  }).join("");
  tags.querySelectorAll(".tag").forEach(el=>{
    el.addEventListener("mouseenter",()=>{
      tourPaused=true;clearTimeout(tourTimer);
      setActiveTag(el);kinoShow(el.dataset.clip);
    });
    el.addEventListener("mouseleave",()=>{
      tourPaused=false;
      if(!heroReduce&&tourSteps.length)tourApply();          // продолжаем тур с текущего шага
      else{setActiveTag(null);kinoShow(KINO_DEFAULT);}
    });
  });
  /* пересобрать шаги тура под свежие DOM-теги (перерендер при смене языка) */
  tourSteps=[{clip:KINO_DEFAULT,tag:null}].concat(
    [...tags.querySelectorAll(".tag")].map(el=>({clip:el.dataset.clip,tag:el}))
  );
  if(heroReduce){kinoV.loop=true;}
  else if(!tourStarted){tourStarted=true;tourIdx=0;tourApply();}
  else if(!tourPaused){tourApply();}                          // обновить ссылки на теги, сохранив позицию
}
if(!matchMedia("(prefers-reduced-motion: reduce)").matches){
  setInterval(()=>{
    roleIdx=(roleIdx+1)%HERO.roles[heroLang].length;
    document.getElementById("kino-word").textContent=HERO.roles[heroLang][roleIdx];
  },2200);
}

/* мобильное меню-гамбургер */
(function(){
  const burger=document.getElementById("burger");
  const navLinks=document.getElementById("nav-links");
  if(!burger||!navLinks)return;
  const close=()=>{navLinks.classList.remove("open");burger.classList.remove("open");burger.setAttribute("aria-expanded","false");};
  burger.addEventListener("click",()=>{
    const open=navLinks.classList.toggle("open");
    burger.classList.toggle("open",open);
    burger.setAttribute("aria-expanded",String(open));
  });
  navLinks.querySelectorAll("a").forEach(a=>a.addEventListener("click",close));
})();

/* клик по CTA — «штамп» */
document.querySelectorAll(".go, .cta-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    btn.classList.remove("stamp");void btn.offsetWidth;btn.classList.add("stamp");
  });
});

/* перфоманс-карточка: hover = play */
const pv=document.getElementById("perf-video");
const pcard=document.querySelector(".perf-card");
pcard.addEventListener("mouseenter",()=>pv.play().catch(()=>{}));
pcard.addEventListener("mouseleave",()=>pv.pause());

/* карточки/шоурил: видео при наведении (data-clip), иначе слайд-шоу (data-slides) */
const cardTimers=new WeakMap();
document.addEventListener("mouseover",e=>{
  const card=e.target.closest(".card[data-slides],.card[data-clip],.reel[data-clip]");
  if(!card||cardTimers.has(card))return;
  const im=card.querySelector(".im");

  if(card.dataset.clip){
    let v=im.querySelector("video.sw");
    if(!v){v=document.createElement("video");v.className="sw";v.muted=true;v.loop=true;v.playsInline=true;v.preload="none";im.appendChild(v);}
    if(v.getAttribute("src")!==card.dataset.clip){v.src=card.dataset.clip;v.load();}
    const go=()=>{v.classList.add("on");v.play().catch(()=>{});};
    if(v.readyState>=2)go();else v.addEventListener("canplay",go,{once:true});
    cardTimers.set(card,{video:v});
    return;
  }
  if(!card.dataset.slides)return;
  let a=im.querySelector("img.sw.a"),b=im.querySelector("img.sw.b");
  if(!a){
    a=document.createElement("img");a.className="sw a";
    b=document.createElement("img");b.className="sw b";
    im.appendChild(a);im.appendChild(b);
  }
  const srcs=card.dataset.slides.split("|");
  cardTimers.set(card,{timer:crossfade(a,b,srcs,700)});
});
document.addEventListener("mouseout",e=>{
  const card=e.target.closest(".card[data-slides],.card[data-clip],.reel[data-clip]");
  if(!card||card.contains(e.relatedTarget))return;
  const entry=cardTimers.get(card);
  if(!entry)return;
  cardTimers.delete(card);
  if(entry.video){
    entry.video.pause();entry.video.classList.remove("on");
    return;
  }
  clearInterval(entry.timer);
  const im=card.querySelector(".im");
  im.querySelectorAll("img.sw").forEach(n=>n.remove());
});

/* reveal: .rv (fade+rotate), .rv-mask (буквы выезжают из-под маски), .rv-stagger (карточки каскадом) */
function initReveal(){
  document.querySelectorAll(".rv,.rv-mask,.rv-stagger").forEach(el=>{
    el.classList.remove("in");
    const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){el.classList.add("in");io.disconnect()}})},{threshold:.12});
    io.observe(el);
  });
}

/* count-up для +250 000 */
function initCount(){
  const fmt=n=>String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g," ");
  document.querySelectorAll("[data-count]").forEach(el=>{
    const target=+el.dataset.count,prefix=el.dataset.prefix||"";
    const io=new IntersectionObserver(es=>{es.forEach(e=>{
      if(!e.isIntersecting)return;io.disconnect();
      const t0=performance.now(),dur=1300;
      (function tick(now){
        const p=Math.min((now-t0)/dur,1),ease=1-Math.pow(1-p,3);
        el.textContent=prefix+fmt(target*ease);
        if(p<1)requestAnimationFrame(tick);
      })(t0);
    })},{threshold:.5});
    io.observe(el);
  });
}

/* смена фона по секциям — кино-переходы + letterbox-склейка на стыке сцен */
(function(){
  const zones=[
    {sel:"#ads",cls:"bg-paper"},
    {sel:"#filmmaking",cls:"bg-dark"},
    {sel:"#about",cls:"bg-warm"},
    {sel:"#contact",cls:"bg-dark"},
  ];
  const all=["bg-paper","bg-dark","bg-warm"];
  const active=new Map();
  let curCls="";
  zones.forEach(z=>{
    const el=document.querySelector(z.sel);
    new IntersectionObserver(es=>{
      es.forEach(e=>active.set(z.sel,e.isIntersecting?e.intersectionRatio:0));
      let best=null,bestR=.08;
      zones.forEach(q=>{const r=active.get(q.sel)||0;if(r>bestR){best=q;bestR=r}});
      const nextCls=best?best.cls:"";
      if(nextCls!==curCls){
        curCls=nextCls;
        if(!matchMedia("(prefers-reduced-motion: reduce)").matches){
          document.body.classList.add("splice");
          setTimeout(()=>document.body.classList.remove("splice"),260);
        }
      }
      document.body.classList.remove(...all);
      if(best)document.body.classList.add(best.cls);
    },{threshold:[0,.12,.3,.55,.8]}).observe(el);
  });
})();

/* прелоадер-ракорд: держим до готовности hero-видео, максимум ~1.2с, только при первом визите */
(function(){
  const pre=document.getElementById("preload");
  if(!pre)return;
  if(sessionStorage.getItem("seen")){pre.remove();return;}
  sessionStorage.setItem("seen","1");
  const numEl=document.getElementById("preload-num");
  let n=3,ticker=null;
  const done=()=>{
    if(ticker)clearInterval(ticker);
    pre.classList.add("out");
    setTimeout(()=>pre.remove(),550);
  };
  if(!matchMedia("(prefers-reduced-motion: reduce)").matches){
    ticker=setInterval(()=>{n--;if(n<1){clearInterval(ticker);return;}numEl.textContent=n;},360);
  }
  const kv=document.getElementById("kino-video");
  if(kv.readyState>=3)done();else kv.addEventListener("canplay",done,{once:true});
  setTimeout(done,1200);
})();

function setLang(lang){
  localStorage.setItem("lang",lang);
  const u=new URL(location);u.searchParams.set("lang",lang);history.replaceState(null,"",u);
  render(lang);
}
const urlLang=new URLSearchParams(location.search).get("lang");
render(urlLang==="en"||urlLang==="ru"?urlLang:(localStorage.getItem("lang")||"ru"));
</script>
